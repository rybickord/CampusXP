<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusXP — Faculty Portal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .card {
      width: 100%; max-width: 420px;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 16px; padding: 2rem;
    }
    label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .15em; color: #888; margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 16px; margin-bottom: 1rem;
      background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 8px;
      color: #fff; font-size: 14px;
    }
    input:focus { outline: none; border-color: rgba(0,255,65,.5); }
    button {
      width: 100%; padding: 14px; background: #00ff41; color: #0a0a0a;
      border: none; border-radius: 8px; font-weight: 700; cursor: pointer;
    }
    .error { color: #f87171; font-size: 12px; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: .25rem; }
    .sub { font-size: 10px; text-transform: uppercase; letter-spacing: .2em; color: #666; margin-bottom: 1.5rem; }
  </style>
</head>
<body>
  <form class="card" method="post">
    {% csrf_token %}
    <p class="sub">CampusXP Gateway</p>
    <h1>Faculty Portal</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <label for="staff_id">Verified Staff ID</label>
    <input type="text" id="staff_id" name="staff_id" placeholder="Enter Staff ID" required />
    <label for="password">Password</label>
    <input type="password" id="password" name="password" placeholder="••••••••" required />
    <button type="submit">Enter Admin Panel →</button>
  </form>
</body>
</html>
